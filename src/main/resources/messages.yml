
prefix: '<gradient:#2a9df4:#44c8ff>[</gradient:#2a9df4:#44c8ff><bold><gradient:gold:yellow>VBS</gradient:gold:yellow></bold><gradient:#2a9df4:#44c8ff>]</gradient:#2a9df4:#44c8ff>'

unknown-command: '%prefix% <red>Error:</red> <gradient:#ff5555:#ffaaaa>Unknown command. Use /wta help for available commands.</gradient:#ff5555:#ffaaaa>'
no-permission: '%prefix% <red>Error:</red> <gradient:#ff5555:#ffaaaa>You do not have permission to use this command.</gradient:#ff5555:#ffaaaa>'
non-player: '%prefix% <red>Error:</red> <gradient:#ff5555:#ffaaaa>This command must be executed by a player.</gradient:#ff5555:#ffaaaa>'
unknown-player: '%prefix% <red>Error:</red> <gradient:#ff5555:#ffaaaa>Player %target% was not found.</gradient:#ff5555:#ffaaaa>'

give:
  grant-item-self: '%prefix% <gradient:yellow:gold>Villager Biome Swapper item granted to</gradient:yellow:gold> <gradient:#00FF00:#32CD32>%player%</gradient:#00FF00:#32CD32>.'
  grant-item-target: '%prefix% <gradient:yellow:gold>Villager Biome Swapper item granted to</gradient:yellow:gold> <gradient:#00FF00:#32CD32>%target%</gradient:#00FF00:#32CD32>.'
  syntax-error: '%prefix% <red>Error:</red> <gradient:#ff5555:#ffaaaa>Invalid usage! Use /vbs give [player].</gradient:#ff5555:#ffaaaa>'

reload:
  all-configs: '%prefix% <gradient:yellow:gold>All configuration files have been successfully reloaded.</gradient:yellow:gold>'
  config: '%prefix% <gradient:yellow:gold>Main configuration file successfully reloaded!</gradient:yellow:gold>'
  messages: '%prefix% <gradient:yellow:gold>Messages configuration file successfully reloaded!</gradient:yellow:gold>'
  biome-swapper-item: '%prefix% <gradient:yellow:gold>Biome Swapper Item configuration file successfully reloaded!</gradient:yellow:gold>'
  gui: '%prefix% <gradient:yellow:gold>GUI configuration file successfully reloaded!</gradient:yellow:gold>'
  syntax-error: '%prefix% <red>Error:</red> <gradient:#ff5555:#ffaaaa>Invalid usage! Use /vbs reload [config|messages|gui|biomeSwapperItem].</gradient:#ff5555:#ffaaaa>'

help:
  help-message: |
    <dark_gray>───────</dark_gray> <bold><gradient:gold:yellow>Villager Biome Swapper</gradient:gold:yellow></bold> <dark_gray>───────</dark_gray>
    <dark_gray>──────────── </dark_gray><bold><gradient:#2a9df4:#44c8ff>Command Help</gradient:#2a9df4:#44c8ff></bold><dark_gray> ────────────</dark_gray>

    <#ffaa00>*</#ffaa00> <gradient:gold:yellow>/vbs give [player]</gradient:gold:yellow>  
     <gray>-> Gives the Villager Biome Swapper Item to the target.</gray>
    
    <#ffaa00>*</#ffaa00> <gradient:gold:yellow>/vbs reload [file]</gradient:gold:yellow>  
     <gray>-> Reloads specific or all configuration files.</gray>
    
    <#ffaa00>*</#ffaa00> <gradient:gold:yellow>/vbs help</gradient:gold:yellow>  
     <gray>-> Lists available commands.</gray>
  syntax-error: '%prefix% <red>Error:</red> <gradient:#ff5555:#ffaaaa>Invalid usage! Use /wta help.</gradient:#ff5555:#ffaaaa>'