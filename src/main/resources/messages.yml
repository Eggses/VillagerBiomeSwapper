# ============================================
# Villager Biome Swapper - Messages
# ============================================
# This file contains all configurable messages used by the plugin.
# Modify these messages to customise the announcements, errors, and feedback players receive.
#
# Supports both legacy color codes (& / §) and MiniMessage formatting!
# Messages must use the same style for consistency, you cannot mix legacy codes and MiniMessages!
#
# For support or assistance, please visit:
# https://discord.gg/erDzWtEQXV
#
# ==============================
# Placeholders
# ==============================
# The following placeholders can be used in messages:
#
# - %prefix%   -> Inserts the plugin's message prefix.
# - %player%   -> The player executing the command or right-clicking a villager.
# - %target%   -> The target player’s name in the /vbs give [player] command.
#
# Ensure placeholders are used only in relevant messages.
#
# ==============================
# Prefix (%prefix%)
# ==============================
# Defines the prefix shown in all plugin messages.
# Customise it to match your server's theme.
prefix: '<gradient:#228B22:#2E8B57>[</gradient:#228B22:#2E8B57><bold><gradient:#FFC107:#FFD54F>VBS</gradient:#FFC107:#FFD54F></bold><gradient:#228B22:#2E8B57>]</gradient:#228B22:#2E8B57>'

# ==============================
# General Error Messages
# ==============================
# Messages sent when a player encounters an error using the plugin.
unknown-command: '%prefix% <red>Error:</red> <gradient:#ff5555:#ffaaaa>Unknown command. Use /vbs help for available commands.</gradient:#ff5555:#ffaaaa>'
no-permission: '%prefix% <red>Error:</red> <gradient:#ff5555:#ffaaaa>You do not have permission to use this command.</gradient:#ff5555:#ffaaaa>'
non-player: '%prefix% <red>Error:</red> <gradient:#ff5555:#ffaaaa>This command must be executed by a player.</gradient:#ff5555:#ffaaaa>'
unknown-player: '%prefix% <red>Error:</red> <gradient:#ff5555:#ffaaaa>Player %target% was not found.</gradient:#ff5555:#ffaaaa>'

# ==============================
# Give Command
# ==============================
# Messages for the /vbs give command, granting the Villager Biome Swapper item.
give:
  grant-item-self: '%prefix% <gradient:#2a9df4:#44c8ff>Villager Biome Swapper item granted to</gradient:#2a9df4:#44c8ff> <gradient:#00FF00:#32CD32>%player%</gradient:#00FF00:#32CD32>.'
  grant-item-target: '%prefix% <gradient:#2a9df4:#44c8ff>Villager Biome Swapper item granted to</gradient:#2a9df4:#44c8ff> <gradient:#00FF00:#32CD32>%target%</gradient:#00FF00:#32CD32>.'
  syntax-error: '%prefix% <red>Error:</red> <gradient:#ff5555:#ffaaaa>Invalid usage! Use /vbs give [player].</gradient:#ff5555:#ffaaaa>'

# ==============================
# Give All Command
# ==============================
# Messages for the /vbs giveall command, granting the item to all players.
give-all:
  grant-item: '%prefix% <gradient:#2a9df4:#44c8ff>Villager Biome Swapper item granted to all players!</gradient:#2a9df4:#44c8ff>'
  syntax-error: '%prefix% <red>Error:</red> <gradient:#ff5555:#ffaaaa>Invalid usage! Use /vbs giveall.</gradient:#ff5555:#ffaaaa>'

# ==============================
# Reload Command
# ==============================
# Messages for the /vbs reload command, allowing admins to reload config files.
reload:
  all-configs: '%prefix% <gradient:#2a9df4:#44c8ff>All configuration files have been successfully reloaded.</gradient:#2a9df4:#44c8ff>'
  config: '%prefix% <gradient:#2a9df4:#44c8ff>Main configuration file successfully reloaded!</gradient:#2a9df4:#44c8ff>'
  messages: '%prefix% <gradient:#2a9df4:#44c8ff>Messages configuration file successfully reloaded!</gradient:#2a9df4:#44c8ff>'
  item: '%prefix% <gradient:#2a9df4:#44c8ff>Item configuration file successfully reloaded!</gradient:#2a9df4:#44c8ff>'
  gui: '%prefix% <gradient:#2a9df4:#44c8ff>GUI configuration file successfully reloaded!</gradient:#2a9df4:#44c8ff>'
  syntax-error: '%prefix% <red>Error:</red> <gradient:#ff5555:#ffaaaa>Invalid usage! Use /vbs reload [config|messages|gui|item].</gradient:#ff5555:#ffaaaa>'

# ==============================
# Help Command
# ==============================
# Messages for the /vbs help command, providing a list of available commands.
help:
  help-message: |
    <dark_gray>────────</dark_gray> <bold><gradient:gold:yellow>Villager Biome Swapper</gradient:gold:yellow></bold> <dark_gray>────────</dark_gray>
    <dark_gray>──────────── </dark_gray><bold><gradient:#228B22:#2E8B57>Command Help</gradient:#228B22:#2E8B57></bold><dark_gray> ────────────</dark_gray>

    <#ffaa00>*</#ffaa00> <gradient:#2a9df4:#44c8ff>/vbs give [player]</gradient:#2a9df4:#44c8ff>  
     <gray>-> Gives the Villager Biome Swapper Item to the target.</gray>
    
    <#ffaa00>*</#ffaa00> <gradient:#2a9df4:#44c8ff>/vbs giveall</gradient:#2a9df4:#44c8ff>  
     <gray>-> Gives the Villager Biome Swapper Item to all Players.</gray>
    
    <#ffaa00>*</#ffaa00> <gradient:#2a9df4:#44c8ff>/vbs reload [file]</gradient:#2a9df4:#44c8ff>  
     <gray>-> Reloads specific or all configuration files.</gray>
    
    <#ffaa00>*</#ffaa00> <gradient:#2a9df4:#44c8ff>/vbs help</gradient:#2a9df4:#44c8ff>  
     <gray>-> Lists available commands.</gray>
  syntax-error: '%prefix% <red>Error:</red> <gradient:#ff5555:#ffaaaa>Invalid usage! Use /vbs help.</gradient:#ff5555:#ffaaaa>'